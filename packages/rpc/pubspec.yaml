name: tekartik_rpc
description: Abstract Remote Procedure Call.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.12.0

dependencies:
  path: ">=1.9.1"
  json_rpc_2:
  meta: ">=1.18.0"
  cv: ">=1.1.0+4"
  tekartik_web_socket_browser:
    git:
      url: https://github.com/tekartik/web_socket.dart
      path: web_socket_browser
    version: '>=0.1.0'
  tekartik_web_socket_io:
    git:
      url: https://github.com/tekartik/web_socket.dart
      path: web_socket_io
    version: '>=0.2.0'
  tekartik_common_utils:
    git:
      url: https://github.com/tekartik/common_utils.dart
  tekartik_web_socket:
    git:
      url: https://github.com/tekartik/web_socket.dart
      path: web_socket
  synchronized: any

dev_dependencies:
  tekartik_rpc_test:
    git:
      url: https://github.com/tekartik/rpc.dart
      path: packages/rpc_test
  tekartik_lints:
    git:
      url: https://github.com/tekartik/common.dart
      path: packages/lints
    version: '>=0.1.0'
  test: ">=1.31.0"
  lints: ">=6.1.0"
resolution: workspace
